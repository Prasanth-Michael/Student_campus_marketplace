<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Services - CampusMkt</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-graduation-cap"></i> CampusMkt
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="create-service.html" class="nav-item"><i class="fa-solid fa-plus-circle"></i> Create Service</a>
                <a href="services.html" class="nav-item active"><i class="fa-solid fa-box-open"></i> My Services</a>
                <a href="orders.html" class="nav-item"><i class="fa-solid fa-list-check"></i> Orders</a>
                <a href="chat.html" class="nav-item"><i class="fa-solid fa-comments"></i> Chat</a>
            </nav>
            <div class="sidebar-footer">
                <a href="login.html" class="nav-item" data-action="logout" style="color: var(--danger);"><i class="fa-solid fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button class="mobile-toggle" id="mobile-toggle"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="page-title">My Services</h1>
                </div>
                <div style="display: flex; align-items: center; gap: 10px; font-weight: 500;">
                    <a href="create-service.html" class="btn btn-primary"><i class="fa-solid fa-plus"></i> New</a>
                </div>
            </header>

            <div id="provider-services-list" class="data-grid">
                <p>Loading services...</p>
            </div>
        </main>
    </div>
    <script src="../shared/app.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
