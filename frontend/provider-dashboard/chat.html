<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Chat - CampusMkt</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-graduation-cap"></i> CampusMkt
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="create-service.html" class="nav-item"><i class="fa-solid fa-plus-circle"></i> Create Service</a>
                <a href="services.html" class="nav-item"><i class="fa-solid fa-box-open"></i> My Services</a>
                <a href="orders.html" class="nav-item"><i class="fa-solid fa-list-check"></i> Orders</a>
                <a href="chat.html" class="nav-item active"><i class="fa-solid fa-comments"></i> Chat</a>
            </nav>
            <div class="sidebar-footer">
                <a href="login.html" class="nav-item" data-action="logout" style="color: var(--danger);"><i class="fa-solid fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header" style="margin-bottom: 20px;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button class="mobile-toggle" id="mobile-toggle"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="page-title">Messages</h1>
                </div>
            </header>

            <div class="chat-layout">
                <div class="chat-contacts-panel">
                    <div class="chat-search-bar">
                        <input id="conversation-search" type="text" placeholder="Search conversations..." style="border-radius: 20px; padding: 10px 14px;">
                    </div>
                    <div class="contact-list" id="conversation-list"></div>
                </div>

                <div class="chat-main">
                    <div class="chat-header-bar">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <img src="https://i.pravatar.cc/150?img=32" alt="Customer" style="width: 44px; border-radius: 50%;">
                            <div>
                                <div id="chat-partner-name" style="font-weight: 700;">Select a conversation</div>
                                <div id="chat-partner-status" style="font-size: 0.8rem; color: var(--success);"></div>
                            </div>
                        </div>
                        <a id="chat-order-link" href="orders.html" class="btn btn-secondary" style="padding: 7px 14px; font-size: 0.85rem;">View Related Order</a>
                    </div>

                    <div class="messages-area" id="chat-messages">
                        <div id="chat-empty-state" class="message received">
                            <div class="msg-bubble">Open a conversation from your orders or service messages.</div>
                        </div>
                    </div>

                    <div class="chat-input-bar">
                        <form class="chat-form" id="chat-form">
                            <input type="text" id="chat-input" placeholder="Type your message here..." autocomplete="off">
                            <button type="submit" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="../shared/app.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
