<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Register - CampusConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-card card">
            <div class="auth-topbar">
                <a href="/" class="ghost-link"><i class="fa-solid fa-arrow-left"></i> Home</a>
                <div class="auth-mini-links">
                    <a href="/buyer-platform/login.html" class="auth-pill">Buyer Login</a>
                    <a href="/buyer-platform/register.html" class="auth-pill">Buyer Register</a>
                    <a href="/provider-dashboard/login.html" class="auth-pill">Provider Login</a>
                    <a href="/provider-dashboard/register.html" class="auth-pill is-active">Provider Register</a>
                </div>
            </div>

            <div class="auth-brand">
                <div class="brand-mark"><i class="fa-solid fa-sparkles"></i></div>
                <div>
                    <h1>Create Provider Account</h1>
                    <p>Launch your service profile and start receiving real buyer orders.</p>
                </div>
            </div>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="provider-name">Full Name</label>
                    <input id="provider-name" type="text" placeholder="Alex Provider" required>
                </div>
                <div class="form-group">
                    <label for="provider-register-email">Email Address</label>
                    <input id="provider-register-email" type="email" placeholder="provider@university.edu" required>
                </div>
                <div class="form-group">
                    <label for="provider-department">Department</label>
                    <input id="provider-department" type="text" placeholder="Computer Science">
                </div>
                <div class="form-group">
                    <label for="provider-bio">Bio</label>
                    <input id="provider-bio" type="text" placeholder="Tutoring, design, repairs...">
                </div>
                <div class="form-group">
                    <label for="provider-register-password">Password</label>
                    <input id="provider-register-password" type="password" placeholder="Create password" required>
                </div>
                <button id="register-submit" type="submit" class="btn btn-primary btn-block">Create Account</button>
            </form>
            <p id="auth-status" class="auth-status"></p>
            <p class="auth-footer-copy">Already registered? <a href="login.html">Login here</a></p>
        </div>
    </div>
    <script src="../shared/app.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
