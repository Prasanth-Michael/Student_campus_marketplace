<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Service - CampusConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-graduation-cap"></i> CampusConnect
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="create-service.html" class="nav-item active"><i class="fa-solid fa-plus-circle"></i> Create Service</a>
                <a href="services.html" class="nav-item"><i class="fa-solid fa-box-open"></i> My Services</a>
                <a href="orders.html" class="nav-item"><i class="fa-solid fa-list-check"></i> Orders</a>
                <a href="chat.html" class="nav-item"><i class="fa-solid fa-comments"></i> Chat</a>
            </nav>
            <div class="sidebar-footer">
                <a href="login.html" class="nav-item" data-action="logout"><i class="fa-solid fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div class="header-row">
                    <button class="mobile-toggle" id="mobile-toggle"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="page-title" id="service-form-title">Create New Service</h1>
                </div>
                <div class="profile-chip">
                    <img src="https://i.pravatar.cc/150?img=11" alt="Profile" class="avatar-chip">
                    <span id="provider-form-name">Provider</span>
                </div>
            </header>

            <div class="card" style="max-width: 700px;">
                <p style="margin-bottom: 24px;">Create or update your campus service listing.</p>

                <form id="create-form">
                    <div class="form-group">
                        <label for="service-title-input">Service Title</label>
                        <input id="service-title-input" type="text" placeholder="Graphic Design for Posters" required>
                    </div>

                    <div class="form-grid-two">
                        <div class="form-group">
                            <label for="service-category-input">Category</label>
                            <input id="service-category-input" type="text" placeholder="Tutoring" required>
                        </div>
                        <div class="form-group">
                            <label for="service-price-input">Price (INR)</label>
                            <input id="service-price-input" type="number" placeholder="500" min="0" required>
                        </div>
                    </div>

                    <div class="form-grid-two">
                        <div class="form-group">
                            <label for="service-delivery-input">Delivery Time</label>
                            <input id="service-delivery-input" type="text" placeholder="2 hours">
                        </div>
                        <div class="form-group">
                            <label for="service-location-input">Location</label>
                            <input id="service-location-input" type="text" placeholder="Library, Hostel A">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="service-tags-input">Tags</label>
                        <input id="service-tags-input" type="text" placeholder="notes, assignment, tutoring">
                    </div>

                    <div class="form-group">
                        <label for="service-description-input">Description</label>
                        <textarea id="service-description-input" rows="4" placeholder="Describe the scope of your service..." required></textarea>
                    </div>

                    <button id="service-submit-button" type="submit" class="btn btn-primary btn-block"><i class="fa-solid fa-upload"></i> Publish Service</button>
                </form>
            </div>
        </main>
    </div>
    <script src="../shared/app.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
