<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Details - CampusConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-graduation-cap"></i> CampusConnect
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="browse.html" class="nav-item active"><i class="fa-solid fa-compass"></i> Browse Services</a>
                <a href="orders.html" class="nav-item"><i class="fa-solid fa-bag-shopping"></i> My Orders</a>
                <a href="chat.html" class="nav-item"><i class="fa-solid fa-comments"></i> Chat</a>
            </nav>
            <div class="sidebar-footer">
                <a href="login.html" class="nav-item" data-action="logout" style="color: var(--danger);"><i class="fa-solid fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button class="mobile-toggle" id="mobile-toggle"><i class="fa-solid fa-bars"></i></button>
                    <a href="browse.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;"><i class="fa-solid fa-arrow-left"></i> Back to Services</a>
                </div>
            </header>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 32px; max-width: 1000px;">
                <div>
                    <h1 id="service-title" style="font-size: 2rem; margin-bottom: 16px;">Loading service...</h1>

                    <div style="display: flex; gap: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px; align-items: center;">
                        <img src="https://i.pravatar.cc/150?img=11" alt="Provider" style="width: 52px; border-radius: 50%;">
                        <div>
                            <div id="service-provider-name" style="font-weight: 700;">Provider</div>
                            <div id="service-provider-meta" style="font-size: 0.85rem; color: var(--text-muted);"></div>
                        </div>
                        <div style="border-left: 1px solid var(--border); padding-left: 24px; margin-left: auto;">
                            <div style="font-size: 0.85rem; color: var(--text-muted);">Rating</div>
                            <span class="rating" id="service-rating"><i class="fa-solid fa-star"></i> 0 (0 reviews)</span>
                        </div>
                    </div>

                    <h3>About This Service</h3>
                    <p id="service-description" style="margin-top: 12px; margin-bottom: 24px; line-height: 1.7;"></p>

                    <h3>Recent Reviews</h3>
                    <div id="service-reviews" style="display: flex; flex-direction: column; gap: 12px; margin-top: 16px;">
                        <p>No reviews yet.</p>
                    </div>
                </div>

                <div>
                    <div class="card" style="position: sticky; top: 32px;">
                        <div id="service-price" style="font-size: 2rem; font-weight: 700; color: var(--primary); margin-bottom: 4px;"></div>
                        <p id="service-meta" style="font-size: 0.9rem; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border);"></p>

                        <a id="order-service-link" href="checkout.html" class="btn btn-primary btn-block" style="margin-bottom: 10px;">Order Now</a>
                        <a id="message-provider-link" href="chat.html" class="btn btn-secondary btn-block"><i class="fa-solid fa-comment"></i> Message Provider</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../shared/app.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
