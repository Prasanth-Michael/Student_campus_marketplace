<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Register - CampusConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="card" style="width: 100%; max-width: 420px;">
            <div style="text-align: center; margin-bottom: 28px;">
                <div style="font-size: 1.5rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px;">
                    <i class="fa-solid fa-graduation-cap"></i> CampusConnect
                </div>
                <p>Create your buyer account</p>
            </div>
            <form id="register-form">
                <div class="form-group">
                    <label for="buyer-name">Full Name</label>
                    <input id="buyer-name" type="text" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="buyer-register-email">University Email</label>
                    <input id="buyer-register-email" type="email" placeholder="student@university.edu" required>
                </div>
                <div class="form-group">
                    <label for="buyer-department">Department</label>
                    <input id="buyer-department" type="text" placeholder="Computer Science">
                </div>
                <div class="form-group">
                    <label for="buyer-register-password">Password</label>
                    <input id="buyer-register-password" type="password" placeholder="Choose a password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="register-submit" style="margin-top: 8px; padding: 13px;">Create Account</button>
            </form>
            <p id="auth-status" style="text-align: center; margin-top: 16px; min-height: 24px;"></p>
            <p style="text-align: center; margin-top: 20px;">
                Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign In</a>
            </p>
        </div>
    </div>
    <script src="../shared/app.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
