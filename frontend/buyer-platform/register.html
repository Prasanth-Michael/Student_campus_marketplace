<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Register - CampusConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-card card">
            <div class="auth-topbar">
                <a href="/" class="ghost-link"><i class="fa-solid fa-arrow-left"></i> Home</a>
                <div class="auth-mini-links">
                    <a href="/buyer-platform/login.html" class="auth-pill">Buyer Login</a>
                    <a href="/buyer-platform/register.html" class="auth-pill is-active">Buyer Register</a>
                    <a href="/provider-dashboard/login.html" class="auth-pill">Provider Login</a>
                    <a href="/provider-dashboard/register.html" class="auth-pill">Provider Register</a>
                </div>
            </div>

            <div class="auth-brand">
                <div class="brand-mark"><i class="fa-solid fa-bag-shopping"></i></div>
                <div>
                    <h1>Create Buyer Account</h1>
                    <p>Set up your student profile and start ordering services on campus.</p>
                </div>
            </div>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="buyer-name">Full Name</label>
                    <input id="buyer-name" type="text" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="buyer-register-email">University Email</label>
                    <input id="buyer-register-email" type="email" placeholder="student@university.edu" required>
                </div>
                <div class="form-group">
                    <label for="buyer-department">Department</label>
                    <input id="buyer-department" type="text" placeholder="Computer Science">
                </div>
                <div class="form-group">
                    <label for="buyer-register-password">Password</label>
                    <input id="buyer-register-password" type="password" placeholder="Choose a password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="register-submit">Create Account</button>
            </form>
            <p id="auth-status" class="auth-status"></p>
            <p class="auth-footer-copy">Already registered? <a href="login.html">Sign in here</a></p>
        </div>
    </div>
    <script src="../shared/app.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
