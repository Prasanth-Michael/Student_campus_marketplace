<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Login - CampusConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-card card">
            <div class="auth-topbar">
                <a href="/" class="ghost-link"><i class="fa-solid fa-arrow-left"></i> Home</a>
                <div class="auth-mini-links">
                    <a href="/buyer-platform/login.html" class="auth-pill is-active">Buyer Login</a>
                    <a href="/buyer-platform/register.html" class="auth-pill">Buyer Register</a>
                    <a href="/provider-dashboard/login.html" class="auth-pill">Provider Login</a>
                    <a href="/provider-dashboard/register.html" class="auth-pill">Provider Register</a>
                </div>
            </div>

            <div class="auth-brand">
                <div class="brand-mark"><i class="fa-solid fa-graduation-cap"></i></div>
                <div>
                    <h1>Buyer Login</h1>
                    <p>Sign in to browse live services, place orders, and message providers.</p>
                </div>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="buyer-email">University Email</label>
                    <input id="buyer-email" type="email" placeholder="student@university.edu" required>
                </div>
                <div class="form-group">
                    <label for="buyer-password">Password</label>
                    <input id="buyer-password" type="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="login-submit">Sign In</button>
            </form>
            <p id="auth-status" class="auth-status"></p>
            <p class="auth-footer-copy">Need an account? <a href="register.html">Create a buyer profile</a></p>
        </div>
    </div>
    <script src="../shared/app.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
