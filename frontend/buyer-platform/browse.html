<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Services - CampusConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-graduation-cap"></i> CampusConnect
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="browse.html" class="nav-item active"><i class="fa-solid fa-compass"></i> Browse Services</a>
                <a href="orders.html" class="nav-item"><i class="fa-solid fa-bag-shopping"></i> My Orders</a>
                <a href="chat.html" class="nav-item"><i class="fa-solid fa-comments"></i> Chat</a>
            </nav>
            <div class="sidebar-footer">
                <a href="login.html" class="nav-item" data-action="logout" style="color: var(--danger);"><i class="fa-solid fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button class="mobile-toggle" id="mobile-toggle"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="page-title">Browse Services</h1>
                </div>
                <form id="browse-search-form" style="position: relative; width: 280px;">
                    <i class="fa-solid fa-search" style="position: absolute; left: 14px; top: 13px; color: var(--text-muted);"></i>
                    <input id="browse-search-input" type="text" placeholder="Search services..." style="padding-left: 40px; border-radius: 20px;">
                </form>
            </header>

            <div id="browse-category-filters" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;"></div>
            <div id="browse-grid" class="data-grid">
                <p>Loading services...</p>
            </div>
        </main>
    </div>
    <script src="../shared/app.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
