<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Service Marketplace - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--secondary);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }
        .login-logo {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 700;
        }
        .login-card form {
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="card login-card">
        <div class="login-logo">
            <i class="fa-solid fa-graduation-cap"></i> CampusMkt
        </div>
        <h2 style="margin-bottom: 8px;">Provider Login</h2>
        <p style="margin-bottom: 32px;">Welcome back, please login to your account.</p>
        
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="e.g. provider@university.edu" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 10px;">Sign In</button>
        </form>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
