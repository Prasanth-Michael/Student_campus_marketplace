<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CampusConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="card" style="width: 100%; max-width: 420px;">
            <div style="text-align: center; margin-bottom: 28px;">
                <div style="font-size: 1.5rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px;">
                    <i class="fa-solid fa-graduation-cap"></i> CampusConnect
                </div>
                <p>Create your Student account</p>
            </div>
            <form id="register-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>University Email</label>
                    <input type="email" placeholder="student@university.edu" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="margin-top: 8px; padding: 13px;">Create Account</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign In</a>
            </p>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
